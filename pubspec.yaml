name: motoai
description: "AI-powered motorcycle diagnosis and repair assistant."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Navigation & Routing
  go_router: ^13.0.0

  # State Management
  flutter_riverpod: ^2.5.0
  riverpod_annotation: ^2.3.3

  # Icons & UI Helper Utilities
  lucide_icons: ^0.257.0
  google_fonts: ^6.1.0
  shimmer: ^3.0.0

  # Hardware & Custom Sensors
  camera: ^0.10.5+9
  speech_to_text: ^7.4.0
  path_provider: ^2.1.1
  flutter_markdown: ^0.6.14

dev_dependencies:
  flutter_test:
    sdk: flutter

  # Code Generation
  build_runner: ^2.4.8
  riverpod_generator: ^2.3.9

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - src/assets/images/
